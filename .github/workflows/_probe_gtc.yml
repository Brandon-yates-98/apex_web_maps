name: _probe_gtc (throwaway)

# Throwaway probe: does a GitHub Actions runner's IP get through GoingToCamp's WAF?
# Run manually from the Actions tab, read the log, then delete this file.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Hit GoingToCamp availability endpoint
        run: |
          echo "runner public IP:"; curl -s https://api.ipify.org; echo
          URL='https://wisconsin.goingtocamp.com/api/availability/map?mapId=-2147483635&resourceLocationId=-2147483634&bookingCategoryId=0&startDate=2026-06-24&endDate=2026-06-25&isReserving=true&getDailyAvailability=false&partySize=1&numEquipment=1&equipmentCategoryId=-32768&filterData=[]'
          code=$(curl -s -o /tmp/body -w '%{http_code}' \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' \
            -H 'Accept: application/json' -H 'Referer: https://wisconsin.goingtocamp.com/' "$URL")
          echo "HTTP $code"
          echo "first 300 bytes:"; head -c 300 /tmp/body; echo
